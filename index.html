<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JarLoc v0.10 - Beta</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/json5@2/dist/index.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <link rel="icon" type="image/png" href="https://i.imgur.com/jYBfWdX.png">
    
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .code-view { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 0.8rem; }
        .anim-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lista de idiomas soportados
        const LANGUAGES = [
            { code: 'es', name: 'Español' },
            { code: 'en', name: 'English' },
            { code: 'pt', name: 'Português' },
            { code: 'fr', name: 'Français' },
            { code: 'de', name: 'Deutsch' },
            { code: 'it', name: 'Italiano' },
            { code: 'ru', name: 'Русский' },
            { code: 'zh', name: '简体中文' }
        ];

        const Icon = ({ name, className = "", size = 24 }) => {
            const iconName = name.toLowerCase().replace(/-([a-z])/g, (g) => g[1].toUpperCase());
            if (!window.lucide || !window.lucide.icons || !window.lucide.icons[iconName]) return null;
            const svgString = window.lucide.icons[iconName].toSvg({
                'class': `lucide lucide-${name} ${className}`,
                'width': size, 'height': size, 'stroke-width': 2
            });
            return <span dangerouslySetInnerHTML={{ __html: svgString }} />;
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key_v5') || '');
            const [modelsList, setModelsList] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            // Nuevo estado para el idioma objetivo
            const [targetLang, setTargetLang] = useState('es');
            const [connectionStatus, setConnectionStatus] = useState('idle');
            const [errorMsg, setErrorMsg] = useState('');

            const [file, setFile] = useState(null);
            const [filesInJar, setFilesInJar] = useState([]);
            const [currentPath, setCurrentPath] = useState(null);
            const [fileContent, setFileContent] = useState('');
            const [translation, setTranslation] = useState('');
            const [isTranslating, setIsTranslating] = useState(false);
            const [logs, setLogs] = useState([]);
            const logEndRef = useRef(null);

            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [logs]);

            const log = (msg, type='info') => setLogs(prev => [{time: new Date().toLocaleTimeString(), msg, type}, ...prev]);

            // --- 1. DESCUBRIMIENTO DE MODELOS ---
            const discoverModels = async () => {
                if(!apiKey) { setErrorMsg("Por favor pega tu API Key primero"); return; }
                setConnectionStatus('loading'); setErrorMsg(''); setModelsList([]);
                log("Buscando modelos disponibles...", 'info');

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const validModels = data.models
                        .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                        .map(m => m.name.replace('models/', ''))
                        .sort();

                    if (validModels.length === 0) throw new Error("No tienes acceso a modelos de texto.");

                    setModelsList(validModels);
                    const bestModel = validModels.find(m => m.includes('pro')) || validModels.find(m => m.includes('flash')) || validModels[0];
                    setSelectedModel(bestModel);
                    
                    setConnectionStatus('success');
                    localStorage.setItem('gemini_key_v5', apiKey);
                    log(`Conectado. ${validModels.length} modelos encontrados.`, 'success');
                } catch (err) {
                    setConnectionStatus('error');
                    let friendlyError = err.message.includes('API key not valid') ? "La API Key es incorrecta." : err.message;
                    setErrorMsg(friendlyError);
                    log("Error de conexión: " + friendlyError, 'error');
                }
            };

            // --- 2. GESTIÓN DE ARCHIVOS ---
            const handleFile = async (e) => {
                const f = e.target.files[0]; if(!f) return;
                setFile(f); setFilesInJar([]); setTranslation(''); setFileContent(''); setCurrentPath(null);
                try {
                    const zip = new JSZip();
                    const content = await zip.loadAsync(f);
                    const list = [];
                    content.forEach((path, entry) => {
                        if(!entry.dir && path.includes('/lang/') && path.endsWith('.json')) list.push(path);
                    });
                    setFilesInJar(list);
                    log(`Archivo cargado. ${list.length} traducciones encontradas.`, 'info');
                } catch(e) { log("Error: El archivo no es un JAR/ZIP válido.", 'error'); }
            };

            const loadInternalFile = async (path) => {
                setCurrentPath(path); setTranslation(''); setErrorMsg('');
                try {
                    const zip = new JSZip();
                    const z = await zip.loadAsync(file);
                    const text = await z.file(path).async('string');
                    setFileContent(text);
                } catch(e) { log("Error leyendo archivo interno.", 'error'); }
            };

            // --- 3. TRADUCCIÓN INTELIGENTE ---
            const translate = async () => {
                if(!selectedModel || !fileContent) return;
                setIsTranslating(true); setErrorMsg('');
                // Obtenemos el nombre legible del idioma para el log
                const langName = LANGUAGES.find(l => l.code === targetLang)?.name || targetLang;
                log(`Iniciando traducción a ${langName} con ${selectedModel}...`, 'info');

                try {
                    // Prompt actualizado con el idioma seleccionado
                    const prompt = `
                        TASK: Translate the values of this JSON to target language code: "${targetLang}".
                        CRITICAL RULES: 
                        1. Output MUST be valid, parseable JSON. No markdown formatting.
                        2. DO NOT translate keys.
                        3. Preserve all formatting codes (§, %, <br>).
                        
                        INPUT JSON:
                        ${fileContent}
                    `;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: {
                                temperature: 0.1,
                                maxOutputTokens: 8192,
                            }
                        })
                    });
                    
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    if(!data.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error("La IA no generó respuesta (posible bloqueo de seguridad).");

                    let txt = data.candidates[0].content.parts[0].text;
                    txt = txt.replace(/^```json\s*/, '').replace(/^```\s*/, '').replace(/```$/, '').trim();
                    
                    let finalJson;
                    try {
                        finalJson = JSON.parse(txt);
                    } catch (parseError) {
                        log(`JSON roto: ${parseError.message}. Intentando reparación inteligente...`, 'warning');
                        try {
                            finalJson = JSON5.parse(txt);
                            log("¡Reparación exitosa con JSON5!", 'success');
                        } catch (json5Error) {
                            log("JSON5 falló. Intentando parcheado quirúrgico...", 'warning');
                            let patchedTxt = txt;
                            if (!patchedTxt.endsWith('}')) {
                                if (!patchedTxt.trim().endsWith('"')) patchedTxt += '"';
                                patchedTxt += "\n}";
                            }
                            try {
                                finalJson = JSON5.parse(patchedTxt);
                                log("¡Reparación exitosa mediante parcheado!", 'success');
                            } catch (patchError) {
                                throw new Error("La IA cortó la respuesta y no se pudo reparar. El archivo es demasiado grande para este modelo.");
                            }
                        }
                    }

                    setTranslation(JSON.stringify(finalJson, null, 2));
                    log("Traducción completada correctamente.", 'success');

                } catch(err) {
                    console.error(err);
                    log(`Fallo crítico: La IA entregó un formato inválido.`, 'error');
                    
                    if (err.message.includes("JSON") && fileContent.length > 10000 && selectedModel.includes('flash')) {
                         setErrorMsg("Error: El archivo es muy grande y el modelo 'Flash' falló al generar el JSON. Por favor, selecciona un modelo 'Pro' en la lista.");
                    } else {
                         setErrorMsg(`Error: ${err.message}. Intenta de nuevo o cambia de modelo.`);
                    }

                } finally {
                    setIsTranslating(false);
                }
            };

            const downloadZip = async () => {
                if(!translation) return;
                try {
                    const zip = new JSZip();
                    const pathParts = currentPath.split('/');
                    let newPath = currentPath;
                    // Usamos el código del idioma seleccionado para el nombre del archivo (ej: fr_fr.json)
                    const langFileName = `${targetLang}_${targetLang}.json`;

                    if (pathParts.length >= 3 && pathParts[0] === 'assets' && pathParts[2] === 'lang') {
                        pathParts[pathParts.length - 1] = langFileName;
                        newPath = pathParts.join('/');
                    } else {
                        newPath = `assets/translated_mod/lang/${langFileName}`;
                    }

                    zip.file(newPath, translation);
                    zip.file("pack.mcmeta", JSON.stringify({pack:{pack_format:15, description:`Traducción IA (${targetLang}) por JarLoc: ${file.name}`}}, null, 2));
                    
                    const b = await zip.generateAsync({type:"blob"});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(b);
                    a.download = `JarLoc_${file.name.replace('.jar','')}_${targetLang.toUpperCase()}.zip`;
                    a.click();
                    log("Resource Pack descargado.", 'success');
                } catch(e) { log("Error creando ZIP.", 'error'); }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto space-y-6 relative">
                    
                    {/* ENCABEZADO AHORA CON v0.10 */}
                    <header className="glass p-6 rounded-2xl border-l-4 border-indigo-500 flex flex-col md:flex-row gap-6 justify-between items-start">
                        <div>
                            <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                <Icon name="satellite" className="text-indigo-400"/> JarLoc <span className="text-xs bg-indigo-600 px-2 py-1 rounded">v0.10 Beta</span>
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">Traductor Inteligente Multi-Idioma</p>
                        </div>

                        <div className="w-full md:w-auto flex flex-col gap-3">
                            <div className="flex gap-2">
                                <input type="password" value={apiKey} onChange={(e) => {setApiKey(e.target.value); setConnectionStatus('idle');}} placeholder="Pega tu Google API Key aquí" className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:border-indigo-500"/>
                                <button onClick={discoverModels} disabled={connectionStatus === 'loading'} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap disabled:opacity-50">
                                    {connectionStatus === 'loading' ? <Icon name="loader-2" className="anim-spin"/> : 'Conectar'}
                                </button>
                            </div>
                            
                            {/* NUEVO: SELECTOR DE IDIOMA */}
                            <div className="flex gap-2">
                                {connectionStatus === 'success' && (
                                    <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="flex-1 bg-slate-900 text-white text-xs p-2 rounded border border-slate-700 animate-fade-in" title="Seleccionar Modelo IA">
                                        {modelsList.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                )}
                                <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} className="w-32 bg-slate-900 text-white text-xs p-2 rounded border border-slate-700 animate-fade-in font-bold text-indigo-300" title="Idioma de destino">
                                    {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.name}</option>)}
                                </select>
                            </div>

                            {errorMsg && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-500/30 max-w-md animate-pulse">{errorMsg}</div>}
                        </div>
                    </header>

                    {/* ZONA DE TRABAJO */}
                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[600px]">
                        {/* Panel Izquierdo: Archivos */}
                        <div className="lg:col-span-3 glass rounded-xl flex flex-col overflow-hidden">
                            <div className="p-4 border-b border-white/5 bg-slate-800/50 relative">
                                <input type="file" onChange={handleFile} accept=".jar,.zip" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                                <div className="flex flex-col items-center justify-center h-24 border-2 border-dashed border-slate-600 rounded-lg text-slate-500">
                                    <Icon name="folder-up" className="mb-2"/>
                                    <span className="text-xs">Subir .JAR / .ZIP</span>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {filesInJar.map((f, i) => (
                                    <button key={i} onClick={() => loadInternalFile(f)} className={`w-full text-left text-xs p-2 rounded truncate transition-colors ${currentPath === f ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                        {f.split('/').pop()}
                                    </button>
                                ))}
                                {filesInJar.length === 0 && <div className="text-center text-slate-600 text-xs mt-10">Esperando archivo...</div>}
                            </div>
                        </div>

                        {/* Panel Central */}
                        <div className="lg:col-span-9 flex flex-col gap-4">
                            <div className="glass p-3 rounded-lg flex justify-between items-center">
                                <div className="text-xs text-slate-400 truncate max-w-[50%]">{currentPath || 'Selecciona un archivo'}</div>
                                <div className="flex gap-3">
                                    <button onClick={() => translate()} disabled={!fileContent || isTranslating || !selectedModel} className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold text-white transition-all ${!selectedModel || !fileContent ? 'bg-slate-700 opacity-50 cursor-not-allowed' : isTranslating ? 'bg-amber-600 cursor-wait' : 'bg-gradient-to-r from-indigo-600 to-violet-600 hover:shadow-lg'}`}>
                                        {isTranslating ? <Icon name="loader-2" className="anim-spin"/> : <Icon name="sparkles"/>}
                                        {isTranslating ? `Traduciendo a ${LANGUAGES.find(l=>l.code===targetLang)?.name}...` : 'Traducir con IA'}
                                    </button>
                                    {translation && (
                                        <button onClick={downloadZip} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 animate-bounce">
                                            <Icon name="download"/> Descargar ZIP
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">
                                <div className="glass rounded-xl flex flex-col overflow-hidden border-slate-700">
                                    <div className="bg-slate-900/80 px-4 py-2 text-xs font-bold text-slate-500 border-b border-slate-700">ORIGINAL ({fileContent.length} chars)</div>
                                    <textarea readOnly value={fileContent} className="flex-1 bg-transparent p-4 text-slate-300 resize-none outline-none code-view" placeholder="// Contenido original..."></textarea>
                                </div>
                                <div className={`glass rounded-xl flex flex-col overflow-hidden relative ${errorMsg ? 'border-red-500/50' : 'border-indigo-500/30'}`}>
                                    <div className={`px-4 py-2 text-xs font-bold border-b ${errorMsg ? 'bg-red-900/20 text-red-400 border-red-500/30' : 'bg-indigo-900/20 text-indigo-400 border-indigo-500/30'}`}>TRADUCCIÓN ({targetLang.toUpperCase()}) {selectedModel ? `(${selectedModel})` : ''}</div>
                                    <textarea readOnly value={translation} className={`flex-1 bg-transparent p-4 resize-none outline-none code-view ${errorMsg ? 'text-red-300' : 'text-emerald-300'}`} placeholder="// Resultado de la IA..."></textarea>
                                    {isTranslating && (
                                        <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-[2px] flex items-center justify-center flex-col gap-2">
                                            <Icon name="cpu" className="text-indigo-400 w-10 h-10 anim-spin"/>
                                            <span className="text-indigo-200 text-xs">Procesando archivo...</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="h-24 glass rounded-xl bg-black/40 p-2 overflow-y-auto font-mono text-[10px] flex flex-col-reverse">
                                {logs.map((l, i) => <div key={i} className={l.type === 'error' ? 'text-red-400' : l.type === 'warning' ? 'text-amber-400' : l.type === 'success' ? 'text-emerald-400' : 'text-slate-500'}>[{l.time}] {l.msg}</div>)}
                                <div ref={logEndRef} />
                            </div>
                        </div>
                    </main>

                    {/* BOTE DE PROPINAS */}
                    <div className="fixed bottom-6 right-6 z-50">
                        <a href="https://ko-fi.com/foboz" target="_blank" className="flex items-center gap-2 bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white px-5 py-3 rounded-full font-bold shadow-lg transition-all hover:scale-105 hover:shadow-rose-500/25 text-sm group">
                            <Icon name="coffee" className="text-white group-hover:animate-bounce" size={20}/>
                            Invítame un café
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
